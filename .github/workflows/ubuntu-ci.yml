name: Ubuntu CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Compile
        run: npm run compile

      - name: Unit tests
        run: npm run test:unit

      - name: Render visual fixtures
        run: npm run visual:render

      - name: Playwright visual tests
        run: npm run visual:test

      - name: VS Code integration tests
        run: npm run test:vscode:headless

      - name: Package VSIX
        run: npm run package

      - name: Verify VSIX contents
        run: npm run verify:vsix
